name: Wake Up Sports Spaces

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping All 5 Spaces
        run: |
          URLS=(
            "https://sidimadt-pro-snrt.hf.space"
            "https://sidimadt-pro-alkass.hf.space"
            "https://sidimadt-pro-ksa.hf.space"
            "https://sidimadt-my-dubai-proxy.hf.space"
            "https://sidimadt-pro-ssc.hf.space"
          )
          for url in "${URLS[@]}"; do
            echo "Checking $url..."
            curl -Is "$url" | head -n 1
          done
