name: Wake Up Sports Spaces

on:
  schedule:
    - cron: '0 */3 * * *' # Pings every 3 hours
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping All Spaces
        run: |
          URLS=(
             "https://sidimadtv-pro-snrt.hf.space"
            "https://sidimadtv-pro-alkass.hf.space"
            "https://sidimadtv-pro-ksa.hf.space"
            "https://sidimadtv-pro-dubai.hf.space"
            "https://sidimadtv-cors-proxy.hf.space"
            "https://sidimadtv-cdrm.hf.space"
            "https://bysidimad-cdrm.hf.space"
            "https://sidim-mycdrm.hf.space"
            "https://sidim-core-proxy.hf.space"
          )
          for url in "${URLS[@]}"; do
            echo "Checking $url..."
            curl -Is -L --max-time 10 "$url" > /dev/null && echo "Success!" || echo "Failed!"
          done

      - name: Self-Commit (Only on the 1st of each month)
        run: |
          # %d extracts the day of the month (01, 02, etc.)
          if [ "$(date +%d)" = "01" ]; then
            echo "It is the 1st of the month. Refreshing activity..."
            date > heartbeat.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add heartbeat.txt
            git commit -m "Monthly keep-alive to prevent workflow suspension"
            git push
          else
            echo "Today is day $(date +%d). Skipping commit to keep history clean."
          fi






